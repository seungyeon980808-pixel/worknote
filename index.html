<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0969da">
<title>WorkNote</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-box">
    <h1>WorkNote</h1>
    <p>기록하고, 분류하고, 잊지 않기</p>
    <button id="btn-login" class="btn btn-primary">Google 계정으로 시작</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="app hidden">

  <!-- ===== APP BAR ===== -->
  <header class="appbar">
    <span class="appbar-title">WorkNote</span>
    <span id="user-name" class="appbar-user"></span>
    <button id="btn-logout" class="btn btn-ghost btn-sm">로그아웃</button>
  </header>

  <!-- ===== CAPTURE BAR ===== -->
  <form id="capture-form" class="capture">
    <input id="capture-input" type="text" placeholder="무엇이든 적으세요 — #태그 함께 가능" autocomplete="off" enterkeyhint="send">
    <button type="submit" class="btn btn-primary">저장</button>
  </form>

  <!-- ===== VIEW ===== -->
  <main id="view" class="view"></main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">WorkNote v1.1.0 &middot; 2026-07-05</footer>

  <!-- ===== NAV ===== -->
  <nav class="nav">
    <a href="#today" data-view="today">오늘</a>
    <a href="#week" data-view="week">주간</a>
    <a href="#inbox" data-view="inbox">인박스<span id="inbox-badge" class="badge hidden"></span></a>
    <a href="#search" data-view="search">검색</a>
    <a href="#secret" data-view="secret">금고</a>
  </nav>

</div>

<!-- ===== OVERLAYS ===== -->
<div id="modal-root"></div>
<div id="toast-root"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
